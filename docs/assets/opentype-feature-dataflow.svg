<svg width="680" height="545" viewBox="0 0 680 545" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>OpenType feature 資料流：現況與缺口</title>
  <desc>四種匯入來源流入單一 IR（OpenTypeFeaturesState），IR 連接視覺化編輯與 .fea 編輯器，向下經 generateFea 與 feaLib 編譯匯出 binary；HarfBuzz 預覽的基礎設施已存在但尚未接上 UI。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="680" height="545" fill="#FDFDFB"/>

  <rect x="40" y="40" width="600" height="104" rx="4" fill="none" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="52" y="56" font-size="12" fill="#5F5E5A">匯入來源</text>

  <rect x="52" y="68" width="135" height="60" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="119.5" y="88" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">Binary 反編譯</text>
  <text x="119.5" y="108" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">GSUB/GPOS 全型別</text>

  <rect x="199" y="68" width="135" height="60" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="266.5" y="88" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">UFO .fea</text>
  <text x="266.5" y="108" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">解析進 IR</text>

  <rect x="346" y="68" width="135" height="60" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
  <text x="413.5" y="88" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">.glyphs features</text>
  <text x="413.5" y="108" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">缺：只存原文</text>

  <rect x="493" y="68" width="135" height="60" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
  <text x="560.5" y="88" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">手動 .fea 掛載</text>
  <text x="560.5" y="108" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">缺：無入口</text>

  <line x1="340" y1="148" x2="340" y2="188" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="210" y="194" width="270" height="86" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <text x="345" y="226" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle" dominant-baseline="central">OpenTypeFeaturesState</text>
  <text x="345" y="250" font-size="12" fill="#534AB7" text-anchor="middle" dominant-baseline="central">單一權威 IR</text>

  <rect x="40" y="194" width="120" height="86" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
  <text x="100" y="226" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">視覺化編輯</text>
  <text x="100" y="250" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">面板多唯讀</text>

  <rect x="530" y="194" width="110" height="86" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
  <text x="585" y="226" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">.fea 編輯器</text>
  <text x="585" y="250" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">缺：無高亮</text>

  <line x1="166" y1="237" x2="204" y2="237" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="486" y1="237" x2="524" y2="237" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <line x1="300" y1="284" x2="152" y2="326" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="330" width="160" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="140" y="350" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">generateFea</text>
  <text x="140" y="370" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">IR → .fea</text>

  <rect x="280" y="330" width="160" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="360" y="350" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">feaLib 編譯</text>
  <text x="360" y="370" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Pyodide worker</text>

  <rect x="500" y="330" width="140" height="56" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="570" y="350" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">匯出 binary</text>
  <text x="570" y="370" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">三種 policy</text>

  <line x1="224" y1="358" x2="274" y2="358" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="444" y1="358" x2="494" y2="358" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="390" x2="360" y2="414" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="420" width="160" height="56" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
  <text x="360" y="440" font-size="14" font-weight="500" fill="#633806" text-anchor="middle" dominant-baseline="central">HarfBuzz 預覽</text>
  <text x="360" y="460" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">缺：UI 未接</text>

  <rect x="150" y="504" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.75"/>
  <text x="170" y="510" font-size="12" fill="#5F5E5A" dominant-baseline="central">已具備</text>
  <rect x="250" y="504" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.75"/>
  <text x="270" y="510" font-size="12" fill="#5F5E5A" dominant-baseline="central">缺口／待補</text>
  <rect x="370" y="504" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.75"/>
  <text x="390" y="510" font-size="12" fill="#5F5E5A" dominant-baseline="central">核心資料層</text>
</svg>
